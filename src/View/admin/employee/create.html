<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Add new employee</h1>

    <label for="name">Name</label>
    <input type="text" id="name" name="name">

    <label for="email">Email</label>
    <input type="email" id="email" name="email">

    <label for="phone">Phone</label>
    <input type="tel" id="phone" name="phone">

    <label for="password">Password</label>
    <input type="password" id="password" name="password">

    <label for="role">Role:</label>
    <select name="role" id="roles">
        <option value="admin">Administrator</option>
        <option value="employee">Employee</option>
    </select>
    <label for="department">Department:</label>
    <select name="department" id="departments">
        <option value="sales">Sales</option>
        <option value="marketing">Marketing</option>
        <option value="accounting">Accounting</option>
        <option value="cs">Costume service</option>
        <option value="engenieer">Engenieer</option>
        <option value="dev">Developer</option>
    </select>

    <label for="details">Function details:</label>
    <input type="text" name="details" id="details">

    <button id="createBtn" type="button">add employee</button>
</body>
</html>
